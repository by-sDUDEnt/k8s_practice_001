name: Backend Docker Image CI for feature/ branches

on:
  push:
    branches: 
      - 'feature/**'
      - 'main'
    paths: 
      - 'backend_app/**'
      - '.github/workflows/backend.yaml'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Ruff linter
      uses: astral-sh/ruff-action@v4.0.0
      with:
          src: "./backend_app"
          version: "0.15.20"

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Short SHA
      run:  echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

    - name: Build and push Docker image
      uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
      with:
        context: ./backend_app/
        file: ./backend_app/Dockerfile
        push: true
        tags: bysdudent/flask-backend:${{ env.SHORT_SHA }}

    - name: Update imageTag
      if: github.ref == 'refs/heads/main'
      run:  yq -i '(.images[] | select(.name == "bysdudent/flask-backend") | .newTag) = "${{ env.SHORT_SHA }}"' ./k8s/backend/kustomization.yaml
      

    - name: Commit image tag bump
      if: github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add ./k8s/backend/kustomization.yaml
        git diff --staged --quiet || git commit -m "chore: bump backend image to ${SHORT_SHA} [skip ci]"
        git push
