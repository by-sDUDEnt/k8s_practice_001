apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
    spec:
      containers:
      - name: backend-flask
        image: bysdudent/flask-backend:latest
        ports:
        - containerPort: 5000