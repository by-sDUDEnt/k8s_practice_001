<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K8S Home Lab Monitor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --surface:  #101010;
      --border:   #1e1e1e;
      --amber:    #e8a020;
      --amber-dim:#7a5010;
      --text:     #c8c8c8;
      --muted:    #444;
      --green:    #3a9e5a;
      --mono:     'Share Tech Mono', 'Courier New', monospace;
      --sans:     'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--amber);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-family: var(--mono);
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 400;
      color: #e8e8e8;
      letter-spacing: 0.05em;
    }

    h1 span { color: var(--amber); }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
    }

    .dot.amber { background: var(--amber); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .card-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .card-body {
      padding: 2rem 1.25rem;
    }

    /* POD NAME — the hero */
    .pod-hero {
      font-family: var(--mono);
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      color: var(--amber);
      min-height: 2rem;
      margin-bottom: 2rem;
      word-break: break-all;
      position: relative;
    }

    .pod-hero::after {
      content: '█';
      animation: blink 1s step-end infinite;
      color: var(--amber);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .pod-hero.loaded::after { display: none; }

    /* Data grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }

    .cell {
      background: var(--bg);
      padding: 0.9rem 1rem;
    }

    .cell-label {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .cell-value {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-all;
    }

    .cell-value.empty { color: var(--muted); }

    /* Status indicator */
    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* Button */
    button {
      width: 100%;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    button:hover {
      border-color: var(--amber);
      background: rgba(232, 160, 32, 0.05);
    }

    button:active { background: rgba(232, 160, 32, 0.1); }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0.1rem;
    }

    .hit-count {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: #c0392b;
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">kubernetes home lab</p>
    <h1>POD <span>MONITOR</span></h1>
  </header>

  <div class="card">
    <div class="card-header">
      <div class="dot amber" id="statusDot"></div>
      <span class="card-label">pod / instance</span>
    </div>

    <div class="card-body">

      <div class="pod-hero" id="podName">waiting...</div>

      <div class="grid">
        <div class="cell">
          <div class="cell-label">Node</div>
          <div class="cell-value empty" id="nodeName">—</div>
        </div>
        <div class="cell">
          <div class="cell-label">Pod IP</div>
          <div class="cell-value empty" id="podIp">—</div>
        </div>
        <div class="cell">
          <div class="cell-label">Status</div>
          <div class="cell-value" id="podStatus">
            <span class="status-dot" id="statusIndicator"></span>
            <span id="statusText">offline</span>
          </div>
        </div>
        <div class="cell">
          <div class="cell-label">Namespace</div>
          <div class="cell-value empty" id="namespace">—</div>
        </div>
      </div>

      <button id="fetchBtn" onclick="fetchPodInfo()">▶ fetch pod info</button>

      <div class="footer">
        <span class="hit-count" id="hitCount">hits: 0</span>
        <span class="error-msg" id="errorMsg"></span>
      </div>

    </div>
  </div>

  <script>
    let hits = 0;

    async function fetchPodInfo() {
      const btn = document.getElementById('fetchBtn');
      const errorMsg = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = '⟳ fetching...';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/api/pod-info');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        typewrite('podName', data.pod_name || 'unknown');
        setValue('nodeName', data.node_name);
        setValue('podIp', data.pod_ip);
        setValue('namespace', data.namespace || 'default');

        document.getElementById('statusIndicator').className = 'status-dot online';
        document.getElementById('statusText').textContent = 'online';

        hits++;
        document.getElementById('hitCount').textContent = `hits: ${hits}`;

      } catch (err) {
        errorMsg.textContent = `error: ${err.message}`;
        document.getElementById('statusIndicator').className = 'status-dot';
        document.getElementById('statusText').textContent = 'offline';
      } finally {
        btn.disabled = false;
        btn.textContent = '▶ fetch pod info';
      }
    }

    function setValue(id, val) {
      const el = document.getElementById(id);
      el.textContent = val || '—';
      el.className = val ? 'cell-value' : 'cell-value empty';
    }

    function typewrite(id, text) {
      const el = document.getElementById(id);
      el.className = 'pod-hero';
      el.textContent = '';
      let i = 0;
      const interval = setInterval(() => {
        el.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          el.classList.add('loaded');
        }
      }, 35);
    }
  </script>

</body>
</html>
